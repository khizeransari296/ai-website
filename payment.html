<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment and Billing</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Payment and Billing</h1>
    <form>
        <h2>Payment Form</h2>
        <div>
            <label for="card-name">Name on Card:</label>
            <input type="text" id="card-name" name="card-name" required>
        </div>
        <div>
            <label for="card-number">Card Number:</label>
            <input type="text" id="card-number" name="card-number" required>
        </div>
        <div>
            <label for="expiry-date">Expiry Date:</label>
            <input type="text" id="expiry-date" name="expiry-date" placeholder="MM/YY" required>
        </div>
        <div>
            <label for="cvv">CVV:</label>
            <input type="text" id="cvv" name="cvv" required>
        </div>
        
        <h2>Billing Address</h2>
        <div>
            <label for="billing-address">Address:</label>
            <input type="text" id="billing-address" name="billing-address" required>
        </div>
        <div>
            <label for="billing-city">City:</label>
            <input type="text" id="billing-city" name="billing-city" required>
        </div>
        <div>
            <label for="billing-zip">ZIP/Postal Code:</label>
            <input type="text" id="billing-zip" name="billing-zip" required>
        </div>

        <h2>Payment Method</h2>
        <div>
            <label>
                <input type="radio" name="payment-method" value="credit-card" checked>
                Credit Card
            </label>
        </div>
        <div>
            <label>
                <input type="radio" name="payment-method" value="paypal">
                PayPal
            </label>
        </div>

        <button type="submit">Submit Payment</button>
    </form>
</body>
</html>
